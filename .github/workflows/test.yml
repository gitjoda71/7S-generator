name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -t .
      - name: Smoke the CLI
        run: |
          python -m corpusgen generate --aoi 60.345,17.422 --area airport \
            --from 2026-06-15 --days 5 --out /tmp/smoke
          python -m corpusgen add-hostiles --corpus /tmp/smoke --type recon
          python -m corpusgen add-protesters --corpus /tmp/smoke --type demonstranter
