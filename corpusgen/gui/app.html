<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>7S-generator</title>
<style>
  :root {
    --bg: #f4f4f0; --panel: #ffffff; --text: #1d211c; --muted: #5c6358;
    --line: #d8d9d2; --accent: #3d5a3d; --accent-text: #ffffff;
    --danger: #a03030; --ok: #2f6b2f; --log-bg: #14170f; --log-text: #cfd6c4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171a15; --panel: #21251f; --text: #e4e7de; --muted: #9aa393;
      --line: #363b33; --accent: #7fa36f; --accent-text: #14170f;
      --danger: #e08080; --ok: #8fc98f; --log-bg: #0d0f0a; --log-text: #b9c2ab;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { display: flex; align-items: baseline; gap: .8rem; padding: 1rem 1.4rem .4rem; }
  header h1 { font-size: 1.25rem; margin: 0; letter-spacing: .03em; }
  header .sub { color: var(--muted); font-size: .85rem; }
  main { max-width: 880px; margin: 0 auto; padding: 0 1.4rem 3rem; }

  nav[role=tablist] { display: flex; gap: .3rem; margin: .8rem 0 1rem; border-bottom: 1px solid var(--line); }
  nav [role=tab] { border: 1px solid transparent; border-bottom: none; background: none; color: var(--muted);
    padding: .45rem 1rem; font: inherit; cursor: pointer; border-radius: 8px 8px 0 0; }
  nav [role=tab][aria-selected=true] { background: var(--panel); color: var(--text);
    border-color: var(--line); font-weight: 600; }
  nav [role=tab]:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  section[role=tabpanel] { background: var(--panel); border: 1px solid var(--line);
    border-radius: 0 10px 10px 10px; padding: 1.2rem 1.4rem; }
  section[hidden] { display: none; }

  label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .15rem; }
  input[type=text], input[type=date], select { width: 100%; padding: .5rem .6rem; font: inherit;
    color: var(--text); background: var(--bg); border: 1px solid var(--line); border-radius: 7px; }
  input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); border-color: var(--accent); }
  .row { display: flex; gap: .8rem; align-items: end; flex-wrap: wrap; margin-bottom: .9rem; }
  .row > div { flex: 1; min-width: 130px; }
  .row > div.narrow { flex: 0 0 8.5rem; }

  button { font: inherit; padding: .5rem 1rem; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--bg); color: var(--text); }
  button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
  button.danger  { color: var(--danger); border-color: var(--danger); background: none; }
  button:disabled { opacity: .45; cursor: default; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.busy::after { content: ""; display: inline-block; width: .8em; height: .8em; margin-left: .5em;
    border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: -0.1em; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status { min-height: 1.3em; margin: .3rem 0 .6rem; font-size: .9rem; }
  .status.err { color: var(--danger); }
  .status.ok  { color: var(--ok); }

  .active-corpus { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap;
    padding: .6rem .8rem; background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; margin-bottom: 1rem; }
  .active-corpus code { font-size: .85rem; user-select: all; overflow-wrap: anywhere; }
  .badge { font-size: .78rem; padding: .12rem .55rem; border-radius: 99px;
    border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
  .badge.hot { color: var(--danger); border-color: var(--danger); }
  .badge.prot { color: #9a7b1a; border-color: #9a7b1a; }
  .copy { font-size: .78rem; padding: .2rem .6rem; }

  .empty { color: var(--muted); padding: 1.2rem 0; }
  .empty b { color: var(--text); }

  .recent-list { display: flex; flex-wrap: wrap; gap: .4rem; margin: .1rem 0 1rem; }
  button.recent { display: inline-flex; align-items: center; gap: .4rem; max-width: 100%;
    padding: .35rem .7rem; font-size: .85rem; border-radius: 99px; }
  button.recent .x { color: var(--muted); font-size: .95em; line-height: 1; }
  button.recent .x:hover { color: var(--danger); }

  progress { width: 100%; height: 12px; accent-color: var(--accent); }
  .progress-line { display: flex; justify-content: space-between; font-size: .85rem;
    color: var(--muted); margin: .25rem 0 .8rem; }
  pre.log { background: var(--log-bg); color: var(--log-text); border-radius: 8px;
    padding: .7rem .9rem; font-size: .8rem; line-height: 1.5; height: 14rem;
    overflow: auto; margin: 0; white-space: pre-wrap; }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 1rem; }
  kbd { border: 1px solid var(--line); border-radius: 4px; padding: 0 .35em; font-size: .85em; }

  /* interaktiv karta */
  #map-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin: 1rem 0 .4rem; }
  .map-modes { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .map-mode { border: none; border-radius: 0; padding: .35rem .7rem; font-size: .85rem; background: var(--bg); }
  .map-mode + .map-mode { border-left: 1px solid var(--line); }
  .map-mode[aria-pressed=true] { background: var(--accent); color: var(--accent-text); font-weight: 600; }
  #map-clear-poly { padding: .35rem .7rem; font-size: .85rem; }
  .map-tiles { display: inline-flex; align-items: center; gap: .3rem; font-size: .85rem; color: var(--text); }
  #map-readout { margin-left: auto; font-variant-numeric: tabular-nums; }
  #map-wrap { position: relative; width: 100%; height: 420px; border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; background: var(--bg); }
  #map-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
  #map-hint { position: absolute; left: .6rem; bottom: .5rem; font-size: .76rem; color: var(--muted);
    background: color-mix(in srgb, var(--panel) 82%, transparent); padding: .2rem .5rem;
    border-radius: 6px; pointer-events: none; max-width: 70%; }
  #map-attribution { position: absolute; right: 0; bottom: 0; font-size: .68rem; color: var(--muted);
    background: color-mix(in srgb, var(--panel) 80%, transparent); padding: .05rem .4rem;
    border-top-left-radius: 5px; pointer-events: none; }
</style>
</head>
<body>
<header>
  <h1>7S-generator</h1>
  <span class="sub">syntetiska 7S-rapportkorpusar — lokal GUI</span>
</header>
<main>
  <nav role="tablist" aria-label="Flikar" id="tabs">
    <button role="tab" aria-selected="false" data-tab="gen">Generera</button>
    <button role="tab" aria-selected="true"  data-tab="korpus">Korpus</button>
    <button role="tab" aria-selected="false" data-tab="feed">Mata ut</button>
  </nav>

  <!-- ============ GENERERA ============ -->
  <section role="tabpanel" id="panel-gen" hidden>
    <div class="row">
      <div>
        <label for="g-aoi">AOI — centrumpunkt (dec.grader, MGRS, DMS eller SWEREF 99 TM)</label>
        <input type="text" id="g-aoi" placeholder="60.345, 17.422  ·  33V XF 66651 79308"
               autocomplete="off" spellcheck="false">
      </div>
      <div class="narrow">
        <label for="g-radius">Radie, km</label>
        <input type="text" id="g-radius" value="3" inputmode="decimal" autocomplete="off">
      </div>
      <div class="narrow">
        <label for="g-area">Områdestyp</label>
        <select id="g-area">
          <option>airport</option><option>coastal</option><option>forest</option>
          <option>military</option><option>port</option><option selected>rural</option>
          <option>suburban</option><option>urban</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="narrow">
        <label for="g-from">Från och med</label>
        <input type="date" id="g-from">
      </div>
      <div class="narrow">
        <label for="g-days">Dagar</label>
        <input type="text" id="g-days" value="14" inputmode="numeric" autocomplete="off">
      </div>
      <div>
        <label for="g-callsigns">Anropssignaler (en sektor var)</label>
        <input type="text" id="g-callsigns" value="AQ,BQ,CQ,DQ" autocomplete="off" spellcheck="false">
      </div>
      <div>
        <label for="g-name">AOI-namn (används i hottext)</label>
        <input type="text" id="g-name" placeholder="objektet" autocomplete="off">
      </div>
    </div>
    <div class="row">
      <div class="narrow">
        <label for="g-seed">Seed (samma seed ⇒ samma korpus)</label>
        <input type="text" id="g-seed" value="2026" inputmode="numeric" autocomplete="off">
      </div>
      <div class="narrow">
        <label for="g-reports">Antal rapporter</label>
        <input type="text" id="g-reports" placeholder="auto" inputmode="numeric" autocomplete="off">
      </div>
      <div>
        <label for="g-out">Utmapp (skapas vid behov)</label>
        <input type="text" id="g-out" placeholder="t.ex. C:\korpusar\korpus_tierp"
               autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="row" style="align-items:center">
      <div style="flex:0 0 auto"><label style="display:inline"><input type="checkbox" id="g-images"> skyltfoton</label>
        <span class="sub" id="g-images-note" style="font-size:.78rem;color:var(--muted)"></span></div>
      <div style="flex:0 0 auto"><label style="display:inline"><input type="checkbox" id="g-obsidian"> Obsidian-format (exakt appformat)</label></div>
      <div style="flex:1"></div>
      <div style="flex:0 0 auto"><button id="g-defaults">Återställ standard</button></div>
      <div style="flex:0 0 auto"><button class="primary" id="g-run">Generera korpus</button></div>
    </div>
    <div class="status" id="g-status" role="alert"></div>

    <!-- interaktiv karta -->
    <input type="hidden" id="g-polygon">
    <div id="map-toolbar">
      <div class="map-modes" role="group" aria-label="Kartläge">
        <button type="button" class="map-mode" data-mode="pan" aria-pressed="true">Panorera</button>
        <button type="button" class="map-mode" data-mode="center" aria-pressed="false">Sätt centrum</button>
        <button type="button" class="map-mode" data-mode="polygon" aria-pressed="false">Rita polygon</button>
      </div>
      <button type="button" id="map-clear-poly" disabled>Rensa polygon</button>
      <label class="map-tiles"><input type="checkbox" id="map-tiles"> Bakgrundskarta <span class="sub">(internet)</span></label>
      <span id="map-readout" class="sub"></span>
    </div>
    <div id="map-wrap">
      <canvas id="map-canvas" tabindex="0" aria-label="Karta för AOI, radie och polygon"></canvas>
      <div id="map-hint"></div>
      <div id="map-attribution" hidden>© OpenStreetMap</div>
    </div>

    <label>Förhandsvisning — exakt de första rapporterna ur skarp körning (samma seed)</label>
    <div class="progress-line" style="margin:.15rem 0 .4rem"><span id="g-estimate">–</span>
      <button class="copy" id="g-copy" disabled>kopiera</button></div>
    <pre class="log" id="g-preview" style="height:17rem">(fyll i AOI, datum m.m. så visas de första rapporterna här)</pre>
  </section>

  <!-- ============ KORPUS ============ -->
  <section role="tabpanel" id="panel-korpus">
    <div id="korpus-active"></div>
    <div id="korpus-recent"></div>
    <div class="row">
      <div>
        <label for="korpus-path">Korpusmapp (innehåller meta.json)</label>
        <input type="text" id="korpus-path" placeholder="t.ex. C:\korpusar\korpus_tierp"
               autocomplete="off" spellcheck="false">
      </div>
      <div class="narrow" style="flex:0 0 auto">
        <button class="primary" id="korpus-use">Använd</button>
      </div>
    </div>
    <div class="status" id="korpus-status" role="alert"></div>
    <p class="empty" style="padding:0">Tips: <kbd>Enter</kbd> i fältet aktiverar korpusen.</p>
  </section>

  <!-- ============ MATA UT ============ -->
  <section role="tabpanel" id="panel-feed" hidden>
    <div id="feed-corpus-line" class="empty" style="padding:.2rem 0 .8rem"></div>
    <div class="row">
      <div>
        <label for="feed-dest">Målmapp (dit rapporterna droppas)</label>
        <input type="text" id="feed-dest" placeholder="t.ex. C:\7s\inkorg"
               autocomplete="off" spellcheck="false">
      </div>
      <div class="narrow">
        <label for="feed-min">Uppspelning, minuter</label>
        <input type="text" id="feed-min" value="15" inputmode="decimal" autocomplete="off">
      </div>
    </div>
    <div class="row" style="align-items:center">
      <div style="flex:0 0 auto"><button class="primary" id="feed-start">Starta matning</button></div>
      <div style="flex:0 0 auto"><button id="feed-send">Skicka 1 nu</button></div>
      <div style="flex:0 0 auto"><button id="feed-pause">Pausa</button></div>
      <div style="flex:0 0 auto"><button id="feed-stop">Stoppa</button></div>
      <div style="flex:0 0 auto"><button class="danger" id="feed-reset">Återställ målmappen</button></div>
    </div>
    <div class="status" id="feed-status-msg" role="alert"></div>
    <progress id="feed-bar" value="0" max="1"></progress>
    <div class="progress-line"><span id="feed-progress-text">–</span><span id="feed-next"></span></div>
    <label>Leveranslogg</label>
    <pre class="log" id="feed-log" aria-live="polite">(ingen matning ännu)</pre>
  </section>
</main>
<footer>lyssnar endast på 127.0.0.1 · fungerar utan internet</footer>

<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
/* lokalt datum som ÅÅÅÅ-MM-DD — toISOString() är UTC och ger gårdagen nattetid */
const today = () => { const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };
let actionPending = 0;   /* pågående knapp-åtgärder: pausa poll-rendering så länge */

/* ---------- api ---------- */
async function api(path, body) {
  const opts = body === undefined ? {} :
    { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) };
  const r = await fetch(path, opts);
  let j = {};
  try { j = await r.json(); } catch (e) { /* tomt svar */ }
  if (!r.ok) throw new Error(j.error || ("fel " + r.status));
  return j;
}

/* busy(btn, fn): disabled direkt, spinner först efter 200 ms; pausar poll-rendering */
async function busy(btn, fn) {
  btn.disabled = true;
  actionPending++;
  const t = setTimeout(() => btn.classList.add("busy"), 200);
  try { return await fn(); }
  finally { clearTimeout(t); btn.classList.remove("busy"); btn.disabled = false; actionPending--; }
}

function setStatus(el, msg, cls) {
  el.textContent = msg || "";
  el.className = "status" + (cls ? " " + cls : "");
}

/* ---------- flikar (klick + piltangenter) ---------- */
const tabs = [...document.querySelectorAll("[role=tab]")];
function showTab(name) {
  tabs.forEach(t => t.setAttribute("aria-selected", String(t.dataset.tab === name)));
  ["gen", "korpus", "feed"].forEach(n => $("panel-" + n).hidden = n !== name);
  const focus = { gen: "g-aoi", korpus: "korpus-path", feed: "feed-dest" }[name];
  if (focus) $(focus).focus();
  if (name === "gen") requestAnimationFrame(() => MAP.resize());  // canvas was hidden while off-tab
  localStorage.setItem("7s.tab", name);
}
tabs.forEach(t => t.addEventListener("click", () => showTab(t.dataset.tab)));
$("tabs").addEventListener("keydown", e => {
  const i = tabs.findIndex(t => t.getAttribute("aria-selected") === "true");
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
    const j = (i + (e.key === "ArrowRight" ? 1 : tabs.length - 1)) % tabs.length;
    tabs[j].focus(); showTab(tabs[j].dataset.tab);
  }
});

/* ---------- korpus ---------- */
function badge(k, v) {
  const cls = k.startsWith("hostile") ? " hot" : (k.startsWith("protester") ? " prot" : "");
  return `<span class="badge${cls}">${k} ${v}</span>`;
}
function renderState(st) {
  const el = $("korpus-active");
  if (!st.active_corpus) {
    el.innerHTML = getRecent().length
      ? `<p class="empty"><b>Ingen aktiv korpus.</b> Välj en tidigare korpus nedan,
         klistra in en sökväg, eller skapa en ny under fliken Generera.</p>`
      : `<p class="empty"><b>Ingen aktiv korpus.</b> Du har ingen korpus än —
         skapa din första under fliken <b>Generera</b> (eller klistra in sökvägen
         till en befintlig korpusmapp nedan).</p>`;
  } else {
    const counts = st.counts ? Object.entries(st.counts).sort()
      .map(([k, v]) => badge(esc(k), esc(v))).join(" ") : "";
    el.innerHTML = `<div class="active-corpus">
        <span>Aktiv korpus:</span> <code id="korpus-code">${esc(st.active_corpus)}</code>
        <button class="copy" id="korpus-copy" title="Kopiera sökvägen">kopiera</button>
        <span style="flex-basis:100%"></span>
        ${st.reports != null ? `<span class="badge">${esc(st.reports)} rapporter</span>` : ""} ${counts}
      </div>`;
    $("korpus-copy").addEventListener("click", async () => {
      await navigator.clipboard.writeText(st.active_corpus);
      $("korpus-copy").textContent = "kopierad ✓";
      setTimeout(() => { const b = $("korpus-copy"); if (b) b.textContent = "kopiera"; }, 1500);
    });
  }
  $("feed-corpus-line").innerHTML = st.active_corpus
    ? `Matar från: <code>${esc(st.active_corpus)}</code>`
    : `<b>Ingen aktiv korpus</b> — välj en under fliken Korpus först.`;
}
async function refreshState() {
  try { renderState(await api("/api/state")); } catch (e) { /* servern borta */ }
}

/* senaste korpusar — kom ihåg mappar som aktiverats (server-kanoniserad sökväg) */
function getRecent() {
  try { const a = JSON.parse(localStorage.getItem("7s.recent") || "[]");
        return Array.isArray(a) ? a : []; } catch (e) { return []; }
}
function rememberCorpus(path) {
  const p = String(path || "").trim();
  if (!p) return;
  const list = [p, ...getRecent().filter(x => x !== p)].slice(0, 8);
  localStorage.setItem("7s.recent", JSON.stringify(list));
  renderRecent();
}
function forgetCorpus(path) {
  localStorage.setItem("7s.recent", JSON.stringify(getRecent().filter(x => x !== path)));
  renderRecent();
}
function shortPath(p) {
  const clean = p.replace(/[\\/]+$/, "");
  const parts = clean.split(/[\\/]/);
  if (parts.length <= 2) return clean;
  const sep = clean.includes("\\") ? "\\" : "/";
  return "…" + sep + parts.slice(-2).join(sep);
}
function renderRecent() {
  const el = $("korpus-recent"), list = getRecent();
  if (!list.length) { el.innerHTML = ""; return; }
  el.innerHTML = `<label>Senaste korpusar</label><div class="recent-list">` +
    list.map(p => `<button class="recent" data-path="${esc(p)}" title="${esc(p)}">` +
      `<span class="txt">${esc(shortPath(p))}</span> <span class="x" title="Ta bort ur listan">✕</span></button>`).join("") +
    `</div>`;
  el.querySelectorAll("button.recent").forEach(b => b.addEventListener("click", e => {
    if (e.target.classList.contains("x")) { forgetCorpus(b.dataset.path); return; }
    $("korpus-path").value = b.dataset.path;
    $("korpus-use").click();
  }));
}

$("korpus-use").addEventListener("click", () => busy($("korpus-use"), async () => {
  setStatus($("korpus-status"), "");
  const typed = $("korpus-path").value.trim();
  try {
    const st = await api("/api/use", { path: typed });
    renderState(st);
    localStorage.setItem("7s.korpus", typed);
    rememberCorpus(st.active_corpus || typed);
    setStatus($("korpus-status"), "aktiv korpus satt ✓", "ok");
  } catch (e) {
    if (/hittades inte|saknar meta\.json/.test(e.message)) forgetCorpus(typed);  // röj döda länkar
    setStatus($("korpus-status"), e.message, "err");
  }
}));
$("korpus-path").addEventListener("keydown", e => { if (e.key === "Enter") $("korpus-use").click(); });

/* ---------- mata ut ---------- */
let confirmReset = 0;
function renderFeed(fs) {
  const running = fs.exists && fs.running, paused = fs.paused === true;
  $("feed-start").disabled = running;
  $("feed-send").disabled = running;
  $("feed-pause").disabled = !running;
  $("feed-pause").textContent = paused ? "Återuppta" : "Pausa";
  $("feed-stop").disabled = !running;
  $("feed-reset").disabled = running || !fs.exists;
  if (fs.exists) {
    $("feed-bar").max = fs.total || 1;
    $("feed-bar").value = fs.delivered || 0;
    $("feed-progress-text").textContent =
      `${fs.delivered}/${fs.total} levererade` + (running ? (paused ? " · pausad" : " · matar") : "")
      + (fs.dest ? ` · mål: ${fs.dest}` : "");
    $("feed-next").textContent = fs.next ? `nästa: ${fs.next.file} [${fs.next.ts}]` : "allt levererat ✓";
    const log = $("feed-log");
    const atBottom = log.scrollTop + log.clientHeight >= log.scrollHeight - 8;
    log.textContent = (fs.log && fs.log.length) ? fs.log.join("\n") : "(tom logg)";
    if (atBottom) log.scrollTop = log.scrollHeight;
  } else {
    $("feed-bar").value = 0;
    $("feed-progress-text").textContent = "–";
    $("feed-next").textContent = "";
  }
}
let pollFails = 0;
async function pollFeed() {
  if (actionPending) return;               /* rör inte knappläget mitt i en åtgärd */
  try {
    const fs = await api("/api/feed/status");
    if (pollFails >= 3) setStatus($("feed-status-msg"), "");   /* servern är tillbaka */
    pollFails = 0;
    renderFeed(fs);
  } catch (e) {
    if (++pollFails === 3) {               /* efter 3 missar: säg det och gå till säkert läge */
      setStatus($("feed-status-msg"), "servern svarar inte — är den stoppad?", "err");
      renderFeed({ exists: false });
    }
  }
}
function feedAction(btn, path, body) {
  return busy(btn, async () => {
    setStatus($("feed-status-msg"), "");
    try { renderFeed(await api(path, body || {})); }
    catch (e) { setStatus($("feed-status-msg"), e.message, "err"); }
  });
}

/* live-förhandsvisning, debounce 500 ms */
let previewTimer = null, previewSeq = 0;
function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(runPreview, 500);
}
function resetPreview() {                          /* aldrig en inaktuell preview kvar */
  $("g-preview").textContent = "(fyll i AOI, datum m.m. så visas de första rapporterna här)";
  $("g-estimate").textContent = "–";
  $("g-copy").disabled = true;
}
async function runPreview() {
  if (!$("g-aoi").value.trim() || !$("g-from").value) {
    previewSeq++;                                  /* ogiltigförklara svar på väg in */
    resetPreview();
    return;
  }
  const seq = ++previewSeq;
  try {
    const pv = await api("/api/preview", genBody());
    if (seq !== previewSeq) return;                /* ett nyare svar är på väg */
    $("g-preview").textContent = pv.reports
      .map(r => "── " + r.file + " " + "─".repeat(Math.max(0, 44 - r.file.length)) + "\n" + r.text)
      .join("\n");
    $("g-estimate").textContent =
      `≈${pv.estimate} rapporter (årstid ${pv.season}, ${pv.locations} platser)`;
    $("g-copy").disabled = false;
    setStatus($("g-status"), "");
  } catch (e) {
    if (seq !== previewSeq) return;
    resetPreview();
    setStatus($("g-status"), e.message, "err");
  }
}

/* generera: jobb + polling; 409 = bekräfta överskrivning med andra klicket.
   Bekräftelsen binds till hela parameteruppsättningen — ändras t.ex. utmappen
   efter varningen gäller den inte längre (fel mapp får aldrig ärva ett ok). */
let genConfirmKey = null;
$("g-run").addEventListener("click", () => busy($("g-run"), async () => {
  setStatus($("g-status"), "");
  const body = genBody();
  if (genConfirmKey !== null && genConfirmKey === JSON.stringify(body)) body.overwrite = true;
  genConfirmKey = null;
  try {
    const { job } = await api("/api/generate", body);
    setStatus($("g-status"), "genererar …");
    for (;;) {
      await new Promise(r => setTimeout(r, 400));
      const j = await api("/api/jobs/" + job);
      if (j.status === "running") continue;
      if (j.status === "error") throw new Error(j.error);
      const res = j.result;
      setStatus($("g-status"),
        `klart ✓ ${res.reports} rapporter till ${res.path} (årstid ${res.season}` +
        (res.plates ? `, ${res.plates} skyltfoton` : "") + `) — nu aktiv korpus`, "ok");
      rememberCorpus(res.path);
      refreshState();
      return;
    }
  } catch (e) {
    if (e.message.includes("bekräfta för att fortsätta")) {
      genConfirmKey = JSON.stringify(body);
      setTimeout(() => genConfirmKey = null, 5000);
      setStatus($("g-status"), e.message + " — klicka på Generera igen inom 5 s.", "err");
    } else {
      setStatus($("g-status"), e.message, "err");
    }
  }
}));

/* ================= interaktiv karta ================= */
const MAP = (function () {
  const TILE = 256;
  const SECTOR_HUES = [205, 25, 145, 285, 55, 325, 175, 95];
  let cv, ctx, cw = 0, ch = 0, dpr = 1, ready = false;
  const st = { center: { lat: 62, lon: 15 }, zoom: 4, aoi: null, radiusKm: 3,
               polygon: [], drawing: false, mode: "pan", tiles: false, locs: [],
               tileCache: new Map(), mouse: null };

  /* --- Web Mercator (matchar OSM-tiles) --- */
  const proj = (lat, lon, z) => {
    const s = TILE * 2 ** z, r = lat * Math.PI / 180;
    return { x: (lon + 180) / 360 * s,
             y: (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * s };
  };
  const unproj = (x, y, z) => {
    const s = TILE * 2 ** z;
    return { lat: 180 / Math.PI * Math.atan(Math.sinh(Math.PI - 2 * Math.PI * y / s)),
             lon: x / s * 360 - 180 };
  };
  const toC = (lat, lon) => {
    const p = proj(lat, lon, st.zoom), c = proj(st.center.lat, st.center.lon, st.zoom);
    return { x: p.x - c.x + cw / 2, y: p.y - c.y + ch / 2 };
  };
  const fromC = (px, py) => {
    const c = proj(st.center.lat, st.center.lon, st.zoom);
    return unproj(c.x + px - cw / 2, c.y + py - ch / 2, st.zoom);
  };
  /* geo (matchar corpusgen/geo.py) */
  const distKm = (a, b, c, d) =>
    Math.hypot((c - a) * 110.574, (d - b) * 111.320 * Math.cos(a * Math.PI / 180));
  const offset = (lat, lon, brg, dist) => {
    const r = brg * Math.PI / 180;
    return { lat: lat + dist * Math.cos(r) / 110.574,
             lon: lon + dist * Math.sin(r) / (111.320 * Math.cos(lat * Math.PI / 180)) };
  };
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const cssVar = n => getComputedStyle(document.body).getPropertyValue(n).trim() || "#888";

  /* --- rendering --- */
  function niceStep(span) {
    // the tightest step giving <= ~9 lines across the view (iterate large->small
    // and keep the last match; returning the FIRST match always gave 30° = no grid)
    const steps = [30, 10, 5, 2, 1, 0.5, 0.2, 0.1, 0.05, 0.02, 0.01, 0.005, 0.002, 0.001];
    let best = steps[steps.length - 1];
    for (const s of steps) if (span / s <= 9) best = s;
    return best;
  }
  function drawGraticule() {
    ctx.fillStyle = cssVar("--bg"); ctx.fillRect(0, 0, cw, ch);
    const nw = fromC(0, 0), se = fromC(cw, ch);
    const step = niceStep(Math.abs(se.lon - nw.lon));
    const dec = step < 1 ? (step < 0.1 ? 3 : 2) : 0;
    ctx.lineWidth = 1; ctx.font = "10px system-ui";
    ctx.strokeStyle = "rgba(128,128,128,.22)"; ctx.fillStyle = "rgba(128,128,128,.85)";
    for (let lon = Math.ceil(nw.lon / step) * step; lon < se.lon; lon += step) {
      const x = toC(nw.lat, lon).x;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
      ctx.fillText(lon.toFixed(dec) + "°", x + 2, ch - 3);
    }
    for (let lat = Math.floor(nw.lat / step) * step; lat > se.lat; lat -= step) {
      const y = toC(lat, nw.lon).y;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
      ctx.fillText(lat.toFixed(dec) + "°", 2, y - 2);
    }
  }
  function drawTiles() {
    const tz = clamp(Math.round(st.zoom), 0, 19), n = 2 ** tz;
    const size = TILE * 2 ** (st.zoom - tz);
    const nw = fromC(0, 0), se = fromC(cw, ch);
    const pnw = proj(nw.lat, nw.lon, tz), pse = proj(se.lat, se.lon, tz);
    for (let tx = Math.floor(pnw.x / TILE); tx <= Math.floor(pse.x / TILE); tx++) {
      for (let ty = Math.floor(pnw.y / TILE); ty <= Math.floor(pse.y / TILE); ty++) {
        if (ty < 0 || ty >= n) continue;
        const wx = ((tx % n) + n) % n, key = tz + "/" + wx + "/" + ty;
        let img = st.tileCache.get(key);
        if (!img) {
          img = new Image(); img.crossOrigin = "anonymous";
          img.onload = () => { if (st.tiles) render(); };
          img.onerror = () => { img.failed = true; };
          img.src = `https://tile.openstreetmap.org/${tz}/${wx}/${ty}.png`;
          st.tileCache.set(key, img);
        }
        const corner = unproj(tx * TILE, ty * TILE, tz), sc = toC(corner.lat, corner.lon);
        if (img.complete && img.naturalWidth)
          ctx.drawImage(img, sc.x, sc.y, size + 1, size + 1);
      }
    }
  }
  function drawCirclePath(lat, lon, km) {
    ctx.beginPath();
    for (let i = 0; i <= 48; i++) {
      const p = offset(lat, lon, i / 48 * 360, km), c = toC(p.lat, p.lon);
      i ? ctx.lineTo(c.x, c.y) : ctx.moveTo(c.x, c.y);
    }
    ctx.closePath();
  }
  function drawSectors(nSectors) {
    if (!st.aoi || nSectors < 1) return;
    const km = st.radiusKm || 3;
    ctx.save(); ctx.lineWidth = 1;
    for (let i = 0; i < nSectors; i++) {
      const brg = i * 360 / nSectors;
      const edge = offset(st.aoi.lat, st.aoi.lon, brg, km * 1.15);
      const a = toC(st.aoi.lat, st.aoi.lon), b = toC(edge.lat, edge.lon);
      ctx.strokeStyle = "rgba(128,128,128,.4)";
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.restore();
  }
  function drawPolygon() {
    const pts = st.polygon;
    if (!pts.length) return;
    ctx.save();
    ctx.beginPath();
    pts.forEach((p, i) => { const c = toC(p[0], p[1]); i ? ctx.lineTo(c.x, c.y) : ctx.moveTo(c.x, c.y); });
    if (st.drawing && st.mouse) { const c = toC(st.mouse.lat, st.mouse.lon); ctx.lineTo(c.x, c.y); }
    else ctx.closePath();
    ctx.fillStyle = "hsla(28,90%,52%,.14)"; ctx.strokeStyle = "hsla(28,90%,48%,.95)";
    ctx.lineWidth = 2; if (!st.drawing) ctx.fill(); ctx.stroke();
    pts.forEach((p, i) => {
      const c = toC(p[0], p[1]);
      ctx.beginPath(); ctx.arc(c.x, c.y, i === 0 && st.drawing ? 6 : 4, 0, 7);
      ctx.fillStyle = i === 0 && st.drawing ? "hsl(28,90%,48%)" : "#fff";
      ctx.fill(); ctx.strokeStyle = "hsl(28,90%,40%)"; ctx.lineWidth = 1.5; ctx.stroke();
    });
    ctx.restore();
  }
  function drawLocations() {
    for (const l of st.locs) {
      const c = toC(l.lat, l.lon);
      ctx.beginPath(); ctx.arc(c.x, c.y, 3, 0, 7);
      ctx.fillStyle = `hsla(${SECTOR_HUES[l.sector % SECTOR_HUES.length]},70%,45%,.9)`;
      ctx.fill();
    }
  }
  function drawAoiAndHandle() {
    if (!st.aoi) return;
    const km = st.radiusKm || 3;
    ctx.save();
    drawCirclePath(st.aoi.lat, st.aoi.lon, km);
    ctx.strokeStyle = cssVar("--accent"); ctx.lineWidth = 2;
    ctx.fillStyle = "color-mix(in srgb," + cssVar("--accent") + " 10%, transparent)";
    ctx.fill(); ctx.stroke();
    const a = toC(st.aoi.lat, st.aoi.lon);          // AOI crosshair
    ctx.strokeStyle = cssVar("--accent"); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(a.x - 8, a.y); ctx.lineTo(a.x + 8, a.y);
    ctx.moveTo(a.x, a.y - 8); ctx.lineTo(a.x, a.y + 8); ctx.stroke();
    const h = handlePos();                           // radius handle (east edge)
    ctx.beginPath(); ctx.arc(h.x, h.y, 6, 0, 7);
    ctx.fillStyle = cssVar("--accent"); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  }
  function handlePos() {
    const e = offset(st.aoi.lat, st.aoi.lon, 90, st.radiusKm || 3);
    return toC(e.lat, e.lon);
  }
  function drawScaleBar() {
    const mid = ch / 2, p0 = fromC(20, mid), p1 = fromC(120, mid);
    const km = distKm(p0.lat, p0.lon, p1.lat, p1.lon);
    const nice = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500].find(s => s >= km) || km;
    const px = 100 * nice / km;
    ctx.save(); ctx.strokeStyle = cssVar("--text"); ctx.fillStyle = cssVar("--text");
    ctx.lineWidth = 2; ctx.font = "10px system-ui";
    const y = ch - 44;                               // ovanför kart-tipsen (nedre vänster)
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(20 + px, y);
    ctx.moveTo(20, y - 4); ctx.lineTo(20, y + 4); ctx.moveTo(20 + px, y - 4); ctx.lineTo(20 + px, y + 4);
    ctx.stroke(); ctx.fillText(nice < 1 ? nice * 1000 + " m" : nice + " km", 24, y - 4);
    ctx.restore();
  }
  function render() {
    if (!ready || !cw) return;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cw, ch);
    if (st.tiles) drawTiles(); else drawGraticule();
    const nSectors = ($("g-callsigns").value.split(",").filter(s => s.trim()).length) || 1;
    drawSectors(nSectors);
    drawLocations();
    drawPolygon();
    drawAoiAndHandle();
    drawScaleBar();
    $("map-attribution").hidden = !st.tiles;
  }

  /* --- size --- */
  function resize() {
    if (!cv) return;
    const r = cv.getBoundingClientRect();
    if (!r.width) return;                            // hidden tab: skip
    dpr = window.devicePixelRatio || 1;
    cw = r.width; ch = r.height;
    cv.width = Math.round(cw * dpr); cv.height = Math.round(ch * dpr);
    render();
  }

  /* --- interaction --- */
  let down = null, moved = 0, radiusDrag = false, panLast = null;
  function evtLL(e) {
    const r = cv.getBoundingClientRect();
    return { px: e.clientX - r.left, py: e.clientY - r.top };
  }
  function onDown(e) {
    cv.focus();
    const { px, py } = evtLL(e);
    down = { px, py }; moved = 0; panLast = { px, py };
    radiusDrag = false;
    if (st.aoi && st.mode !== "polygon") {
      const h = handlePos();
      if (Math.hypot(px - h.x, py - h.y) <= 10) radiusDrag = true;
    }
  }
  function onMove(e) {
    const { px, py } = evtLL(e);
    st.mouse = fromC(px, py);
    const rd = st.mouse;
    $("map-readout").textContent = `${rd.lat.toFixed(5)}, ${rd.lon.toFixed(5)}`;
    if (down) moved += Math.hypot(px - panLast.px, py - panLast.py);
    if (radiusDrag && st.aoi) {
      st.radiusKm = clamp(distKm(st.aoi.lat, st.aoi.lon, st.mouse.lat, st.mouse.lon), 0.1, 100);
      $("g-radius").value = st.radiusKm.toFixed(st.radiusKm < 1 ? 2 : 1);
      render();
    } else if (down && st.mode === "pan") {
      st.center = fromC(cw / 2 - (px - panLast.px), ch / 2 - (py - panLast.py));
      panLast = { px, py }; render();
    } else if (st.drawing) {
      render();
    }
  }
  function onUp(e) {
    if (!down) return;
    const wasClick = moved < 5;
    const { px, py } = evtLL(e);
    if (radiusDrag) { radiusDrag = false; down = null; onRadiusChanged(); return; }
    if (wasClick) {
      const ll = fromC(px, py);
      if (st.mode === "center") setAoi(ll.lat, ll.lon, true);
      else if (st.mode === "polygon") polygonClick(ll, px, py);
    }
    down = null;
  }
  function onWheel(e) {
    e.preventDefault();
    const { px, py } = evtLL(e);
    const before = fromC(px, py);
    st.zoom = clamp(st.zoom + (e.deltaY < 0 ? 0.5 : -0.5), 2, 19);
    const after = fromC(px, py);
    st.center.lat += before.lat - after.lat;
    st.center.lon += before.lon - after.lon;
    render();
  }
  function polygonClick(ll, px, py) {
    if (st.polygon.length >= 3) {                    // close if near the first vertex
      const c0 = toC(st.polygon[0][0], st.polygon[0][1]);
      if (Math.hypot(px - c0.x, py - c0.y) <= 10) { finishPolygon(); return; }
    }
    st.polygon.push([+ll.lat.toFixed(6), +ll.lon.toFixed(6)]);
    st.drawing = true; render();
  }
  function persistPolygon() {                      // survive a page reload like the rest of the form
    const json = st.polygon.length >= 3 ? JSON.stringify(st.polygon) : "";
    $("g-polygon").value = json;
    $("map-clear-poly").disabled = !json;
    localStorage.setItem("7s.polygon", json);
  }
  function finishPolygon() {
    st.drawing = false;
    if (st.polygon.length >= 3) { persistPolygon(); onAreaShapeChanged(); }
    else { clearPolygon(); }
    render();
  }
  function clearPolygon() {
    st.polygon = []; st.drawing = false;
    persistPolygon(); onAreaShapeChanged(); render();
  }

  /* --- sync with the form --- */
  let locTimer = null;
  function onAreaShapeChanged() {          // AOI / radius / polygon / area / seed moved
    genPersist(); schedulePreview(); refreshLocations();
  }
  function onRadiusChanged() { onAreaShapeChanged(); }
  function setAoi(lat, lon, writeField) {
    st.aoi = { lat, lon };
    if (writeField) { $("g-aoi").value = `${lat.toFixed(5)}, ${lon.toFixed(5)}`; onAreaShapeChanged(); }
    render();
  }
  function refreshLocations() {
    clearTimeout(locTimer);
    locTimer = setTimeout(async () => {
      if (!$("g-aoi").value.trim()) { st.locs = []; render(); return; }
      try {
        const r = await api("/api/preview-locations", {
          aoi: $("g-aoi").value, radius: $("g-radius").value, area: $("g-area").value,
          callsigns: $("g-callsigns").value, seed: $("g-seed").value, polygon: getPolygon() });
        st.locs = r.locations;
        st.aoi = { lat: r.aoi[0], lon: r.aoi[1] };   // server-canonicalised (handles MGRS etc.)
        render();
      } catch (e) { st.locs = []; render(); }
    }, 400);
  }
  let aoiTimer = null;
  function parseAoiField() {                 // user typed in the AOI field
    clearTimeout(aoiTimer);
    aoiTimer = setTimeout(async () => {
      const v = $("g-aoi").value.trim();
      if (!v) { st.aoi = null; st.locs = []; render(); return; }
      try {
        const r = await api("/api/parse", { text: v });
        setAoi(r.lat, r.lon, false);
        if (st.zoom < 9) { st.zoom = 12; }           // first fix: zoom in
        st.center = { lat: r.lat, lon: r.lon };
        render(); refreshLocations();
      } catch (e) { /* ofullständig inmatning — vänta */ }
    }, 450);
  }
  function setRadiusFromField() {
    const v = parseFloat(($("g-radius").value || "").replace(",", "."));
    if (v > 0) { st.radiusKm = v; render(); }
  }
  function getPolygon() {
    return st.polygon.length >= 3 ? st.polygon : null;
  }

  /* --- setup --- */
  function setMode(m) {
    st.mode = m;
    document.querySelectorAll(".map-mode").forEach(b =>
      b.setAttribute("aria-pressed", String(b.dataset.mode === m)));
    cv.style.cursor = m === "pan" ? "grab" : "crosshair";
    if (m !== "polygon" && st.drawing) finishPolygon();
    $("map-hint").textContent = {
      pan: "Dra för att panorera · scrolla för att zooma · dra ringen för radie",
      center: "Klicka för att sätta centrum (AOI) · dra ringen för radie",
      polygon: "Klicka för att lägga hörn · klicka första hörnet (eller dubbelklick) för att stänga · Esc rensar",
    }[m];
  }
  function restorePolygon() {
    try {
      const p = JSON.parse(localStorage.getItem("7s.polygon") || "null");
      if (Array.isArray(p) && p.length >= 3) {
        st.polygon = p;
        $("g-polygon").value = JSON.stringify(p);
        $("map-clear-poly").disabled = false;
      }
    } catch (e) { /* strunt-värde */ }
  }
  function init() {
    cv = $("map-canvas"); ctx = cv.getContext("2d"); ready = true;
    restorePolygon();
    cv.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    cv.addEventListener("wheel", onWheel, { passive: false });
    cv.addEventListener("dblclick", e => { e.preventDefault(); if (st.drawing) finishPolygon(); });
    cv.addEventListener("keydown", e => { if (e.key === "Escape" && st.drawing) clearPolygon(); });
    cv.addEventListener("mouseleave", () => { $("map-readout").textContent = ""; });
    document.querySelectorAll(".map-mode").forEach(b =>
      b.addEventListener("click", () => setMode(b.dataset.mode)));
    $("map-clear-poly").addEventListener("click", clearPolygon);
    $("map-tiles").addEventListener("change", e => { st.tiles = e.target.checked; render(); });
    window.addEventListener("resize", resize);
    setMode("pan");
    resize();
  }
  return { init, resize, parseAoiField, setRadiusFromField, getPolygon, refreshLocations,
           setMode, clearPolygon };
})();

/* ---------- init ---------- */
genRestore();
schedulePreview();
MAP.init();
if ($("g-aoi").value.trim()) MAP.parseAoiField();     // recenter on a restored AOI
$("korpus-path").value = localStorage.getItem("7s.korpus") || "";
$("feed-dest").value = localStorage.getItem("7s.dest") || "";
$("feed-min").value = localStorage.getItem("7s.min") || "15";
renderRecent();
// Förstagångsanvändare (ingen historik) landar på Generera — där man skapar sin
// första korpus; annars respekteras senast använda flik, med Korpus som fallback.
showTab(localStorage.getItem("7s.tab") || (getRecent().length ? "korpus" : "gen"));
refreshState();
pollFeed();
setInterval(pollFeed, 1000);
setInterval(refreshState, 5000);
</script>
</body>
